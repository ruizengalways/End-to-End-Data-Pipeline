name: CI/CD Pipeline

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  PYTHON_VERSION: "3.10"

jobs:
  lint:
    name: "🔍 Lint & Format Check"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install linting tools
        run: pip install flake8 black isort

      - name: Run flake8
        run: |
          flake8 airflow/ spark/ kafka/ storage/ governance/ ml/ monitoring/ \
            --max-line-length=120 \
            --ignore=E501,W503,E203 \
            --count --statistics

      - name: Check formatting with black
        run: |
          black --check --line-length=120 \
            airflow/ spark/ kafka/ storage/ governance/ ml/ monitoring/

      - name: Check import ordering
        run: |
          isort --check-only --profile black \
            airflow/ spark/ kafka/ storage/ governance/ ml/ monitoring/

  python-tests:
    name: "🧪 Python Unit Tests"
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

  build-airflow:
    name: "🐳 Build Airflow"
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Airflow image
        uses: docker/build-push-action@v5
        with:
          context: ./airflow
          push: false
          tags: e2e-pipeline/airflow:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-spark:
    name: "🐳 Build Spark"
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Spark image
        uses: docker/build-push-action@v5
        with:
          context: ./spark
          push: false
          tags: e2e-pipeline/spark:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-kafka-producer:
    name: "🐳 Build Kafka Producer"
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Kafka Producer image
        uses: docker/build-push-action@v5
        with:
          context: ./kafka
          push: false
          tags: e2e-pipeline/kafka-producer:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-dotnet-api:
    name: "🐳 Build .NET API"
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build .NET API image
        uses: docker/build-push-action@v5
        with:
          context: ./sample_dotnet_backend
          push: false
          tags: e2e-pipeline/dotnet-api:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-compose-validation:
    name: "📋 Docker Compose Validation"
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy env file
        run: cp .env.example .env

      - name: Validate docker-compose.yaml
        run: docker compose config --quiet

  integration-test:
    name: "🔗 Integration Test"
    runs-on: ubuntu-latest
    needs: [build-airflow, build-spark, build-kafka-producer, build-dotnet-api, docker-compose-validation]
    env:
      POSTGRES_USER: pipeline_user
      POSTGRES_PASSWORD: pipeline_secret_2024
      POSTGRES_DB: processed_db
      MYSQL_ROOT_PASSWORD: root_secret_2024
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy env file
        run: cp .env.example .env

      - name: Start core infrastructure
        run: |
          docker compose up -d zookeeper kafka mysql postgres minio redis mongodb
          echo "Waiting for services to be healthy..."
          sleep 45

      - name: Check service health
        run: |
          echo "=== Service Status ==="
          docker compose ps
          echo ""
          echo "=== Kafka Check ==="
          docker compose exec -T kafka kafka-topics --bootstrap-server localhost:29092 --list || echo "Kafka not ready"
          echo ""
          echo "=== PostgreSQL Check ==="
          docker compose exec -T postgres pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
          echo ""
          echo "=== MySQL Check ==="
          docker compose exec -T mysql mysqladmin ping -h localhost -u root -p"$MYSQL_ROOT_PASSWORD"
          echo ""
          echo "=== Redis Check ==="
          docker compose exec -T redis redis-cli ping

      - name: Teardown
        if: always()
        run: docker compose down -v

  pipeline-complete:
    name: "✅ Pipeline Complete"
    runs-on: ubuntu-latest
    needs: [lint, python-tests, build-airflow, build-spark, build-kafka-producer, build-dotnet-api, docker-compose-validation, integration-test]
    if: always()
    steps:
      - name: Check job results
        run: |
          if [ "${{ needs.lint.result }}" = "failure" ] || \
             [ "${{ needs.build-airflow.result }}" = "failure" ] || \
             [ "${{ needs.build-spark.result }}" = "failure" ] || \
             [ "${{ needs.build-kafka-producer.result }}" = "failure" ] || \
             [ "${{ needs.build-dotnet-api.result }}" = "failure" ] || \
             [ "${{ needs.docker-compose-validation.result }}" = "failure" ]; then
            echo "Pipeline failed - check individual job logs"
            exit 1
          fi
          echo "All pipeline checks passed successfully!"
