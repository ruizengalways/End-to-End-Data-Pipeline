name: CI/CD Pipeline

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  PYTHON_VERSION: "3.10"

jobs:
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install linting tools
        run: pip install flake8 black isort

      - name: Run flake8
        run: |
          flake8 airflow/ spark/ kafka/ storage/ governance/ ml/ monitoring/ \
            --max-line-length=120 \
            --ignore=E501,W503,E203 \
            --count --statistics

      - name: Check formatting with black
        run: |
          black --check --line-length=120 \
            airflow/ spark/ kafka/ storage/ governance/ ml/ monitoring/

      - name: Check import ordering
        run: |
          isort --check-only --profile black \
            airflow/ spark/ kafka/ storage/ governance/ ml/ monitoring/

  python-tests:
    name: Python Unit Tests
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

  docker-build:
    name: Docker Build - ${{ matrix.service.name }}
    runs-on: ubuntu-latest
    needs: [lint]
    strategy:
      fail-fast: false
      matrix:
        service:
          - name: airflow
            context: ./airflow
          - name: spark
            context: ./spark
          - name: kafka-producer
            context: ./kafka
          - name: dotnet-api
            context: ./sample_dotnet_backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.service.name }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.context }}
          push: false
          tags: e2e-pipeline/${{ matrix.service.name }}:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-compose-validation:
    name: Docker Compose Validation
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy env file
        run: cp .env.example .env

      - name: Validate docker-compose.yaml
        run: docker compose config --quiet

  integration-test:
    name: Integration Test (Core Services)
    runs-on: ubuntu-latest
    needs: [docker-build, docker-compose-validation]
    env:
      POSTGRES_USER: pipeline_user
      POSTGRES_PASSWORD: pipeline_secret_2024
      POSTGRES_DB: processed_db
      MYSQL_ROOT_PASSWORD: root_secret_2024
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy env file
        run: cp .env.example .env

      - name: Start core infrastructure
        run: |
          docker compose up -d zookeeper kafka mysql postgres minio redis mongodb
          echo "Waiting for services to be healthy..."
          sleep 45

      - name: Check service health
        run: |
          echo "=== Service Status ==="
          docker compose ps
          echo ""
          echo "=== Kafka Check ==="
          docker compose exec -T kafka kafka-topics --bootstrap-server localhost:29092 --list || echo "Kafka not ready"
          echo ""
          echo "=== PostgreSQL Check ==="
          docker compose exec -T postgres pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
          echo ""
          echo "=== MySQL Check ==="
          docker compose exec -T mysql mysqladmin ping -h localhost -u root -p"$MYSQL_ROOT_PASSWORD"
          echo ""
          echo "=== Redis Check ==="
          docker compose exec -T redis redis-cli ping

      - name: Teardown
        if: always()
        run: docker compose down -v

  pipeline-complete:
    name: Pipeline Status
    runs-on: ubuntu-latest
    needs: [lint, python-tests, docker-build, docker-compose-validation, integration-test]
    if: always()
    steps:
      - name: Check job results
        run: |
          if [ "${{ needs.lint.result }}" = "failure" ] || \
             [ "${{ needs.docker-build.result }}" = "failure" ] || \
             [ "${{ needs.docker-compose-validation.result }}" = "failure" ]; then
            echo "Pipeline failed - check individual job logs"
            exit 1
          fi
          echo "All pipeline checks passed successfully!"
